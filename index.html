<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCFHS ERROR RESISTANCE SIMULATOR (100 ITEMS)</title>
    <style>
        :root { --crimson: #800000; --gold: #b8860b; --dark: #0a0a0a; --gray: #1a1a1a; --text: #e0e0e0; }
        body { font-family: 'Courier New', Courier, monospace; background: var(--dark); color: var(--text); line-height: 1.6; padding: 20px; }
        .wrapper { max-width: 900px; margin: auto; border: 2px solid var(--gold); padding: 30px; background: var(--gray); }
        .warning-header { text-align: center; border-bottom: 2px solid var(--crimson); margin-bottom: 30px; padding-bottom: 10px; }
        .warning-header h1 { color: var(--crimson); letter-spacing: 3px; margin: 0; }
        .warning-header p { color: var(--gold); font-weight: bold; font-size: 0.9rem; }
        .q-card { margin-bottom: 50px; padding: 20px; border-left: 4px solid var(--gold); background: #222; }
        .vignette { color: #aaa; margin-bottom: 15px; font-style: italic; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .question { font-weight: bold; font-size: 1.1rem; color: #fff; display: block; margin-bottom: 20px; }
        .opt { display: block; padding: 12px; margin: 8px 0; background: #111; border: 1px solid #444; cursor: pointer; transition: 0.3s; }
        .opt:hover { border-color: var(--gold); background: #1a1a1a; }
        .opt input { margin-right: 15px; accent-color: var(--gold); }
        .btn-submit { width: 100%; background: var(--crimson); color: white; padding: 20px; border: none; font-size: 1.2rem; cursor: pointer; font-weight: bold; margin-top: 30px; }
        #transcript { display: none; background: white; color: black; padding: 40px; border: 10px double black; }
        .result-row { border-bottom: 1px solid #ddd; padding: 15px 0; }
        .fail-marker { color: #d00; font-weight: bold; text-transform: uppercase; }
        .pass-marker { color: #008000; font-weight: bold; }
        .rationale { font-size: 0.85rem; background: #f0f0f0; padding: 10px; margin-top: 5px; border-left: 3px solid var(--crimson); }
        .footer-note { text-align: center; color: var(--gold); margin-top: 20px; font-size: 0.8rem; border-top: 1px dashed var(--gold); padding-top: 10px; }
    </style>
</head>
<body>

<div id="exam-view" class="wrapper">
    <div class="warning-header">
        <h1>PROMETRIC SAFETY FILTER</h1>
        <p>LEVEL 4: ERROR RESISTANCE & TRAP DETECTION (100 ITEMS)</p>
    </div>

    <div style="background: #000; padding: 15px; margin-bottom: 30px; border: 1px dashed var(--gold);">
        <label style="color:var(--gold)">CANDIDATE IDENTIFICATION:</label><br>
        <input type="text" id="candidate" style="width:100%; background:transparent; border:none; border-bottom:1px solid var(--gold); color:white; font-size:1.2rem; outline:none;" placeholder="Enter Name...">
    </div>

    <div id="quiz-mount"></div>
    
    <button class="btn-submit" onclick="analyzePerformance()">PROCESS TRANSCRIPT</button>
</div>

<div id="transcript" class="wrapper">
    <div class="warning-header">
        <h1 style="color: #000;">PERFORMANCE TRANSCRIPT</h1>
        <p style="color: #333;">Saudi Commission for Health Specialties | Level 4 Evaluator</p>
    </div>
    <div id="meta-data" style="background: #f9f9f9; padding: 20px; border: 1px solid #000; margin-bottom: 30px; font-family: monospace;"></div>
    <div id="analysis-results"></div>
    <button class="btn-submit" style="background: #000;" onclick="window.print()">PRINT OFFICIAL RECORD</button>
    <button class="btn-submit" style="background: #444; margin-top: 10px;" onclick="location.reload()">RETAKE SIMULATION</button>
</div>

<script>
const questions = [
    // 1-10 (Bases on previous history)
    { v: "A patient with suspected AAA reports sharp, tearing back pain. BP 70/40.", q: "Immediate priority?", o: ["Document location", "Wait for surgeon", "Large-bore IV fluids", "Surgical consent"], a: 2, r: "Stability first." },
    { v: "4yo child with barking cough becomes quiet and cyanotic.", q: "Priority action?", o: ["Oxygen/Intubation", "Document cyanosis", "Wait for MD", "Chest percussion"], a: 0, r: "Airway priority." },
    { v: "Heparin patient, platelets drop from 250k to 90k.", q: "Safety filter?", o: ["Explain HIT", "Stop Heparin", "Wait for repeat", "Document"], a: 1, r: "Stop trigger." },
    { v: "CVC becomes disconnected and open to air.", q: "First safe step?", o: ["Left-side Trendelenburg", "Wait for resident", "Document", "ECG"], a: 0, r: "Prevent air embolus." },
    { v: "Cushing's Triad (Bradycardia, Widened Pulse Pressure) in neuro patient.", q: "Nurse must:", o: ["Escalate immediately", "Wait for headache", "Document only", "Full CN exam"], a: 0, r: "Acute neuro change." },
    { v: "Internal radiation implant falls out.", q: "Safety priority?", o: ["Forceps/Lead box", "Wait for officer", "Pick by hand", "Document"], a: 0, r: "Radiation safety." },
    { v: "Sucking chest wound trauma.", q: "Priority?", o: ["Occlusive dressing (3 sides)", "Explain tension pneumo", "Wait for chest tube", "Document RR"], a: 0, r: "Act before explain." },
    { v: "K+ 6.8 with wide QRS.", q: "Avoid Authority Trap:", o: ["Give Calcium Gluconate", "Wait for repeat", "Document ECG", "Dietary education"], a: 0, r: "Abnormal + unstable = act." },
    { v: "UAP checking BP on arm with AV Graft.", q: "Ethical/Safety?", o: ["Stop UAP immediately", "Wait and teach", "Document error", "Reassure patient"], a: 0, r: "Safety overrides debate." },
    { v: "Femur fracture, sudden confusion, petechiae.", q: "Priority?", o: ["High-flow O2/Notify", "Document anxiety", "Wait for X-ray", "Explain healing"], a: 0, r: "Fat Embolism protocol." },
    
    // 11-20
    { v: "Neonate HR 55, not breathing.", q: "First Safe Step?", o: ["PPV", "Chest compressions", "Wait for APGAR", "Document"], a: 0, r: "Airway/Breathing first." },
    { v: "Major burn, output 10mL/hr.", q: "Fluid filter?", o: ["Increase fluids", "Wait for rounds", "Document oliguria", "Explain risks"], a: 0, r: "Volume resuscitation." },
    { v: "Ventilator low pressure alarm, tubing disconnected.", q: "Priority?", o: ["Reconnect tubing", "Wait for RT", "Document", "Explain alarm"], a: 0, r: "Act before document." },
    { v: "Patient receiving med they are allergic to.", q: "Authority Trap?", o: ["Stop infusion", "Call MD to check", "Wait for charge nurse", "Document error"], a: 0, r: "Hold unsafe meds." },
    { v: "Head injury, 1000mL urine in 2hrs, Na 155.", q: "Endocrine filter?", o: ["Report/DDAVP", "Wait for gravity", "Document polyuria", "Explain fluids"], a: 0, r: "DI suspected." },
    { v: "NG tube vomiting around tube.", q: "Simplest safe action?", o: ["Check patency (Irrigate)", "Wait for smaller tube", "Document", "Explain nausea"], a: 0, r: "Maintain patency." },
    { v: "Hip fracture patient too drowsy to stand.", q: "Safety priority?", o: ["Return to bed", "Force to stand", "Wait and re-try", "Explain ambulation"], a: 0, r: "Prevent falls." },
    { v: "Tracheostomy suctioning, HR drops 90 to 55.", q: "First Safe Step?", o: ["Stop/Oxygenate", "Complete suctioning", "Wait for recovery", "Document"], a: 0, r: "Stop stimulus." },
    { v: "Bubbling in water seal chamber during cough.", q: "Respiratory filter?", o: ["Document as normal", "Clamp tube", "Wait for MD", "Explain leak"], a: 0, r: "Expected finding." },
    { v: "Seizure during sterile dressing change.", q: "Safety priority?", o: ["Stop and protect", "Finish dressing", "Wait for end", "Document"], a: 0, r: "Safety > Sterility." },

    // 21-40 (New Mix)
    { v: "Board-like uterus, sharp pain, dark bleeding.", q: "Priority?", o: ["Prepare Emergency CS", "Wait for US", "Document", "Vaginal exam"], a: 0, r: "Abruptio Placentae." },
    { v: "Tet-spell in infant.", q: "Action?", o: ["Knee-chest position", "Explain path", "Wait for RRT", "Document"], a: 0, r: "Increase systemic resistance." },
    { v: "500mL air infused into CVC.", q: "Action?", o: ["Left-side Trendelenburg", "Document error", "Increase rate", "Wait for Xray"], a: 0, r: "Trap air in atrium." },
    { v: "Psych patient tying sheet around neck.", q: "Action?", o: ["Remove/1:1 obs", "Ask why", "Wait for security", "Document"], a: 0, r: "Immediate threat." },
    { v: "Urine 150mL/hr to 0mL/hr post-kidney transplant.", q: "Action?", o: ["Irrigate catheter", "Wait for labs", "Explain rejection", "Increase rate"], a: 1, r: "Check blockage." },
    { v: "Unlabelled syringe on cart.", q: "Safety?", o: ["Discard immediately", "Wait for owner", "Document after use", "Use it"], a: 0, r: "Unknown = Unsafe." },
    { v: "Hip post-op, knees higher than hips.", q: "Action?", o: ["Correct position", "Wait for PT", "Document", "Explain"], a: 0, r: "Prevent dislocation." },
    { v: "Red Man Syndrome during Vancomycin.", q: "Action?", o: ["Slow rate", "Stop med", "Wait for MD", "Document allergy"], a: 0, r: "Rate-dependent." },
    { v: "Nasal flaring/grunting in preterm neonate.", q: "Action?", o: ["CPAP/Oxygen", "Wait for 10m APGAR", "Document", "Explain"], a: 0, r: "Breathing support." },
    { v: "Femur fracture, O2 82%.", q: "Action?", o: ["High-flow O2", "Wait for ABG", "Document", "Full neuro exam"], a: 0, r: "Hypoxia first." },
    { v: "Blood running via 24G catheter.", q: "Action?", o: ["Restart 18/20G", "Document", "Wait for bag finish", "Explain"], a: 0, r: "Prevent hemolysis." },
    { v: "Chest tube system cracked.", q: "Action?", o: ["Place tube in sterile water", "Clamp tube", "Wait for RT", "Document"], a: 0, r: "Maintain seal." },
    { v: "Insulin pump + MRI order.", q: "Action?", o: ["Remove pump", "Wait for specialist", "Document", "Scan anyway"], a: 0, r: "Metal/Magnet hazard." },
    { v: "Preeclampsia, MgSO4, output 10mL/hr.", q: "Action?", o: ["Hold MgSO4", "Document", "Increase fluids", "Explain"], a: 0, r: "Prevent toxicity." },
    { v: "Seizure lasting 6 minutes.", q: "Action?", o: ["Diazepam/Lorazepam", "Wait for end", "Document", "Sternal rub"], a: 0, r: "Status Epilepticus." },
    { v: "Post-gastrectomy foul drainage.", q: "Action?", o: ["Notify Surgeon", "Wait for dressing", "Document", "Explain"], a: 0, r: "Anastomotic leak." },
    { v: "Nurse taking wound photos on personal phone.", q: "Action?", o: ["Stop and delete", "Wait for Privacy Off.", "Document", "Ignore"], a: 0, r: "HIPAA violation." },
    { v: "Traction weights on floor.", q: "Action?", o: ["Adjust weights", "Wait for Tech", "Document", "Explain"], a: 0, r: "Constant tension." },
    { v: "DNR patient choking on food.", q: "Action?", o: ["Heimlich", "Wait for family", "Respect DNR", "Code team"], a: 0, r: "Preventable death." },
    { v: "K+ 3.0 and PVCs.", q: "Action?", o: ["Potassium replacement", "Wait for repeat", "Document", "Explain caffeine"], a: 0, r: "Prevent V-Tach." },

    // 41-60 (High Stakes Scenarios)
    { v: "CSF leak from nose (Halo sign).", q: "Priority?", o: ["Loose sterile pad", "Pack nose", "Suction", "Document"], a: 0, r: "Prevent infection/ICP." },
    { v: "Frequent throat clearing post-thyroidectomy.", q: "Priority?", o: ["Check for bleed", "Cough meds", "Explain normal", "Document"], a: 0, r: "Airway/Hematoma." },
    { v: "Red streak up arm from IV site.", q: "Action?", o: ["Remove IV", "Slow rate", "Document", "Wait for MD"], a: 0, r: "Stop trigger." },
    { v: "Active seizure in bed, rails down.", q: "Action?", o: ["Side-lying/Protect head", "Tongue blade", "Restrain", "Document"], a: 0, r: "Safety first." },
    { v: "Cloudy TPN bag.", q: "Action?", o: ["Return to pharmacy", "Shake bag", "Filter it", "Document"], a: 0, r: "Embolism risk." },
    { v: "Tripod position, drooling, child.", q: "Action NOT to do?", o: ["Tongue depressor", "Oxygen", "Keep on lap", "Intubation"], a: 0, r: "Avoid laryngospasm." },
    { v: "Mg toxicity (RR 8, No DTR).", q: "Action?", o: ["Stop Mg/Antidote", "Document", "Flush fluids", "Reassure"], a: 0, r: "Antidote needed." },
    { v: "Extreme pain, leg cast, no relief from Morphine.", q: "Diagnosis?", o: ["Compartment Syndrome", "Drug seeking", "Document", "Normal pain"], a: 0, r: "Ischemia risk." },
    { v: "Back pain/Hematuria during transfusion.", q: "Action?", o: ["Stop transfusion", "Slow rate", "Document", "Call MD first"], a: 0, r: "Reaction protocol." },
    { v: "Bleeding radioactive implant.", q: "Safety?", o: ["Use forceps", "Bare hands", "Document only", "Wait for officer"], a: 0, r: "Distance/Time." },
    { v: "Trach dislodged partially.", q: "Action?", o: ["Keep stoma open", "Push back in", "Document", "Wait for RT"], a: 0, r: "Maintain airway." },
    { v: "Patient climbing over side rails.", q: "Action?", o: ["Lower rails/Commode", "Restrain", "Document", "Wait for family"], a: 0, r: "Least restrictive." },
    { v: "Nitroglycerin drop BP 130 to 90.", q: "Action?", o: ["Legs elevated", "Document", "Wait for ECG", "Give 2nd dose"], a: 0, r: "Positioning." },
    { v: "Aspirin use before colonoscopy.", q: "Action?", o: ["Ensure stopped 5-7d", "Wait for bleed", "Document only", "Ignore"], a: 0, r: "Bleeding risk." },
    { v: "Psych patient with sharpened spoon.", q: "Action?", o: ["Confiscate/Search", "Ask why", "Wait for Psych", "Document"], a: 0, r: "Safety hazard." },
    { v: "Mill-wheel murmur, CVC line.", q: "Action?", o: ["Left Trendelenburg", "Wait for Xray", "Document", "Flush air"], a: 0, r: "Air embolism." },
    { v: "Apical pulse 52, Digoxin scheduled.", q: "Action?", o: ["Hold/Notify", "Give/Document", "Wait for charge", "Explain"], a: 0, r: "Standard safety." },
    { v: "Neonatal phototherapy, shields slipped.", q: "Action?", o: ["Replace immediately", "Wait for feed", "Document", "Turn off lights"], a: 0, r: "Protect eyes." },
    { v: "Tidaling stopped in chest tube.", q: "Action?", o: ["Check for kinks", "Wait for Xray", "Document", "Milk tube"], a: 0, r: "Simple fix first." },
    { v: "Sudden gasp during CVC change.", q: "Action?", o: ["Clamp/Left side", "Document", "Wait for RT", "Increase O2"], a: 0, r: "Air embolus." },

    // 61-80 (Critical Decision Making)
    { v: "Suspected TB patient.", q: "Isolation?", o: ["Negative pressure/N95", "Surgical mask", "Wait for sputum", "Document"], a: 0, r: "Airborne protocol." },
    { v: "Large bolus saline in HF patient.", q: "Risk?", o: ["Pulmonary Edema", "Dehydration", "Renal failure", "Document"], a: 0, r: "Volume overload." },
    { v: "Wetness under back, post-femoral sheath.", q: "Action?", o: ["Check for bleed", "Change sheets", "Document", "Explain"], a: 0, r: "Hidden hemorrhage." },
    { v: "K+ 6.2 in burn patient.", q: "Action?", o: ["ECG/Antidote", "Wait for repeat", "Document", "Explain"], a: 0, r: "Cardiac arrest risk." },
    { v: "Buck's traction weights on floor.", q: "Action?", o: ["Reposition patient", "Lift weights to bed", "Wait for ortho", "Document"], a: 0, r: "Continuous tension." },
    { v: "Patient broke NPO with coffee.", q: "Action?", o: ["Notify Surgeon", "Document", "Wait for nausea", "Explain"], a: 0, r: "Aspiration risk." },
    { v: "Gentamicin + Output 10mL/hr.", q: "Action?", o: ["Hold next dose", "Increase fluids", "Document", "Wait"], a: 0, r: "Nephrotoxicity." },
    { v: "Patient doubts new medication.", q: "Action?", o: ["Re-verify order", "Give anyway", "Wait for MD", "Document"], a: 0, r: "Safety signal." },
    { v: "Bowel loop visible post-op.", q: "Action?", o: ["Moist saline gauze", "Push back in", "Wait for Surgeon", "Document"], a: 0, r: "Protect tissue." },
    { v: "O2 monitor 82% but patient looks fine.", q: "Action?", o: ["Check equipment", "Code Blue", "Document hypoxia", "Wait for RT"], a: 0, r: "Assess patient first." },
    { v: "Warfarin INR 5.5 + Tarry stools.", q: "Action?", o: ["Hold/Vitamin K", "Increase dose", "Wait", "Document"], a: 0, r: "Antidote protocol." },
    { v: "Pacing agitated psych patient.", q: "Staff safety?", o: ["Maintain exit path", "Block way", "Wait for hit", "Document"], a: 0, r: "De-escalation." },
    { v: "C-spine injury transfer.", q: "Action?", o: ["Log-roll/Stabilize", "Slide quickly", "Patient move self", "Document"], a: 0, r: "Prevent paralysis." },
    { v: "Feeding tube pH 7.0.", q: "Diagnosis?", o: ["Respiratory placement", "Stomach placement", "Wait for cough", "Document"], a: 0, r: "Unsafe placement." },
    { v: "Casted leg tingling/pins.", q: "Action?", o: ["Assess/Notify", "Tell to wait", "Document", "Give pain meds"], a: 0, r: "Neurovascular." },
    { v: "DNR patient stops breathing.", q: "Action?", o: ["Comfort care", "Start CPR", "Wait for MD", "Call Code"], a: 0, r: "Respect directive." },
    { v: "Diabetic, sweaty, shaky before lunch.", q: "Action?", o: ["Check sugar/Carbs", "Give insulin", "Wait for lunch", "Document"], a: 0, r: "Treat hypoglycemia." },
    { v: "RR 6 on PCA pump.", q: "Action?", o: ["Stop pump/Naloxone", "Document", "Wait for wake", "Explain"], a: 0, r: "Overdose protocol." },
    { v: "Full bladder, 0 output, catheter.", q: "Action?", o: ["Check for kinks", "Increase fluids", "Wait", "Document"], a: 0, r: "Simple fix first." },
    { v: "Penicillin allergy + Amoxicillin order.", q: "Action?", o: ["Hold/Notify", "Give/Watch", "Wait", "Document"], a: 0, r: "Cross-sensitivity." },

    // 81-100 (Final Validation)
    { v: "Saturated surgical dressing.", q: "Action?", o: ["Pressure/Notify", "Remove dressing", "Wait for rounds", "Document"], a: 0, r: "Control bleed." },
    { v: "Tall T-waves, missed dialysis.", q: "Diagnosis?", o: ["Hyperkalemia", "Dehydration", "Normal", "Anxiety"], a: 0, r: "Cardiac risk." },
    { v: "Blue hand in restraint.", q: "Action?", o: ["Release immediately", "Loosen slightly", "Wait", "Document"], a: 0, r: "Perfusion loss." },
    { v: "Crunching sound in ear during CVC flush.", q: "Diagnosis?", o: ["Malposition", "Normal", "Wait", "Document"], a: 0, r: "Jugular placement." },
    { v: "Head injury, one dilated pupil.", q: "Action?", o: ["Notify/Emergency CT", "Wait", "Document", "Explain"], a: 0, r: "Herniation risk." },
    { v: "TPN ran out, new bag not ready.", q: "Action?", o: ["Hang D10W", "Stop IV", "Document", "Flush Saline"], a: 0, r: "Sugar stability." },
    { v: "Fever/Chills during CVC infusion.", q: "Action?", o: ["Stop/Notify", "Slow rate", "Wait", "Document"], a: 0, r: "Sepsis risk." },
    { v: "Cold/Pale foot in cast.", q: "Action?", o: ["Notify Surgeon", "Explain air cond", "Wait", "Document"], a: 0, r: "Arterial block." },
    { v: "Suicidal patient with hidden belt.", q: "Action?", o: ["Confiscate/1:1", "Wait for use", "Document", "Explain"], a: 0, r: "Immediate threat." },

    { v: "Asthma patient + Beta Blocker.", q: "Risk?", o: ["Bronchospasm", "Tachycardia", "Normal", "Document"], a: 0, r: "Drug-disease trap." },
    { v: "Dizzy patient scheduled for discharge.", q: "Action?", o: ["Hold/Reassess", "Discharge anyway", "Wait for fall", "Document"], a: 0, r: "Safety first." },
    { v: "Wrong patient IV fluid label.", q: "Action?", o: ["Return/Correct", "Use anyway", "Wait", "Document"], a: 0, r: "Wrong patient error." },
    { v: "Unstable HR during procedure.", q: "Action?", o: ["Stop procedure", "Finish quick", "Wait", "Document"], a: 0, r: "Stability > Task." },

    { v: "Post-op abdominal distension.", q: "Risk?", o: ["Paralytic Ileus", "Normal", "Wait for fart", "Document"], a: 0, r: "Early warning." },

    { v: "Coughing up pink frothy sputum.", q: "Action?", o: ["HF/Notify", "Document", "Wait", "Explain"], a: 0, r: "Pulmonary Edema." }

function renderQuiz() {
    const mount = document.getElementById('quiz-mount');
    mount.innerHTML = questions.map((q, i) => `
        <div class="q-card">
            <div class="vignette">${i+1}. ${q.v}</div>
            <label class="question">${q.q}</label>
            ${q.o.map((opt, j) => `
                <label class="opt">
                    <input type="radio" name="q${i}" value="${j}"> ${opt}
                </label>
            `).join('')}
        </div>
    `).join('');
}

function analyzePerformance() {
    const candidateName = document.getElementById('candidate').value || "ANONYMOUS";
    let score = 0;
    let report = "";

    questions.forEach((q, i) => {
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        const userVal = selected ? parseInt(selected.value) : null;
        const isCorrect = userVal === q.a;
        if(isCorrect) score++;

        report += `
            <div class="result-row">
                <strong>Item ${i+1}:</strong> ${isCorrect ? '<span class="pass-marker">[DETECTION SUCCESS]</span>' : '<span class="fail-marker">[SAFETY TRAP TRIGGERED]</span>'}
                <p style="margin:5px 0"><em>Situation: ${q.v}</em></p>
                <div class="rationale"><strong>Rationale:</strong> ${q.r}</div>
            </div>`;
    });

    document.getElementById('meta-data').innerHTML = `
        CANDIDATE: ${candidateName.toUpperCase()}<br>
        FINAL SCORE: ${score} / 100<br>
        STATUS: ${score >= 60 ? 'ELIGIBLE' : 'FAILURE'}<br>
        DATE: ${new Date().toLocaleString()}
    `;
    
    document.getElementById('analysis-results').innerHTML = report;
    document.getElementById('exam-view').style.display = "none";
    document.getElementById('transcript').style.display = "block";
    window.scrollTo(0,0);
}

renderQuiz();
</script>

</body>
</html>

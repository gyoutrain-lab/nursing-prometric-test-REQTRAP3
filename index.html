function init() {
    const mount = document.getElementById('quiz-mount');
    questions.forEach((q, index) => {
        const div = document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `
            <div class="vignette">${q.v}</div>
            <span class="question">${index + 1}. ${q.q}</span>
            ${q.o.map((opt, i) => `<label class="opt"><input type="radio" name="q${index}" value="${i}"> ${opt}</label>`).join('')}
        `;
        mount.appendChild(div);
    });
}

function analyzePerformance() {
    const nameInput = document.getElementById('candidate').value;
    if(!nameInput) {
        alert("CRITICAL ERROR: Candidate Name is required.");
        return;
    }

    let rawScore = 0;
    const totalItems = questions.length;
    const reviewArea = document.getElementById('analysis-results');
    reviewArea.innerHTML = '<h3 style="border-bottom: 2px solid #000;">CLINICAL RATIONALE REVIEW</h3>';

    questions.forEach((q, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        const isCorrect = selected && parseInt(selected.value) === q.a;
        if(isCorrect) rawScore++;

        const row = document.createElement('div');
        row.className = 'result-row';
        row.innerHTML = `
            <p><strong>Item ${index + 1}:</strong> Status: <span class="${isCorrect ? 'pass-marker' : 'fail-marker'}">${isCorrect ? 'SAFE' : 'UNSAFE'}</span></p>
            <p>Correct: ${q.o[q.a]}</p>
            <div class="rationale"><strong>Rationale:</strong> ${q.r}</div>
        `;
        reviewArea.appendChild(row);
    });

    const percentage = Math.round((rawScore / totalItems) * 100);
    const passingScore = 80;
    const isPassed = percentage >= passingScore;

    document.getElementById('exam-view').style.display = 'none';
    document.getElementById('transcript').style.display = 'block';
    
    document.getElementById('meta-data').innerHTML = `
        <p><strong>CANDIDATE:</strong> ${nameInput.toUpperCase()}</p>
        <p><strong>SCORE:</strong> ${rawScore} / ${totalItems} (${percentage}%)</p>
        <p><strong>STATUS:</strong> <span class="${isPassed ? 'pass-marker' : 'fail-marker'}">${isPassed ? 'PASSED' : 'FAILED'}</span></p>
    `;
    window.scrollTo(0,0);
}

window.onload = init;
